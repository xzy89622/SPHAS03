server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/project03?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  redis:
    host: localhost
    port: 6379
    timeout: 3000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml

jwt:
  secret: "project03_jwt_secret_key_32_bytes_minimum"
  expireMinutes: 10080

app:
  adminInitKey: "SPHAS03_INIT_ADMIN_2026"
  baseUrl: "http://localhost:8080"
  backup:
    mysqldump: mysqldump
    dir: backups

ai:
  python:
    baseUrl: http://127.0.0.1:5001

wechat:
  miniapp:
    appid: wxc7bae19c57694f00
    secret: a8e8049f96b659b7a29aca34c7383d78

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha